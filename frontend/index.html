<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PomodoRealm</title>
  <link rel="stylesheet" href="styles/main.css">
</head>

<body>
  <header>
    <nav>
      <h1>PomodoRealm</h1>
      <ul>
        <li><a href="index.html" class="active">Timer</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="world.html">Your World</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="timer-section">
      <div class="timer-circle">
        <span id="time-display">25:00</span>
      </div>

      <div class="controls">
        <button id="start-btn" class="btn start">Start</button>
        <button id="pause-btn" class="btn pause">Pause</button>
        <button id="reset-btn" class="btn reset">Reset</button>
      </div>

      <p id="session-label" class="session-label">Focus Session</p>
    </section>
  </main>

  <script src="client-scripts/timer.js"></script>
</body>
</html>
